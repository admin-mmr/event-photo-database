name: cloud-webapp CI

on:
  push:
    branches: [main]
    paths: ['cloud-webapp/**', '.github/workflows/ci.yml']
  pull_request:
    paths: ['cloud-webapp/**', '.github/workflows/ci.yml']

defaults:
  run:
    working-directory: cloud-webapp

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: cloud-webapp/.nvmrc
          cache: npm
          cache-dependency-path: cloud-webapp/package-lock.json
      - run: npm ci
      # web's project reference to shared needs shared/dist to exist (TS6305)
      - run: npm run build -w @cloud-webapp/shared
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  matcher:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-webapp/matcher
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: cloud-webapp/matcher/requirements.txt
      - run: pip install -r requirements.txt -r requirements-test.txt
      # Model weights are not in the repo; real-model tests self-skip.
      - run: pytest -v

  indexer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-webapp/indexer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: cloud-webapp/indexer/requirements.txt
      # Tests fake Drive/Firestore/embedding — only numpy + Pillow are exercised.
      - run: pip install numpy Pillow pytest
      - run: pytest -v
