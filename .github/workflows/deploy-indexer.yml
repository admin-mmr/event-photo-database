name: Deploy indexer to Cloud Run Jobs

# Builds and deploys the `photo-indexer` Cloud Run Job. Unlike the api/web
# deploys this reuses infra/scripts/deploy-indexer.sh, because the build pulls
# ~184 MB of ONNX model weights from GCS into the build context IN-CLOUD (via
# Cloud Build) — keeping the runner upload to source only and the deploy logic
# in one place.
#
# One-time IAM (grant as an owner; the api/web deployer SA doesn't have these by
# default). Two distinct identities are involved:
#
# A) The DEPLOYER SA (secrets.GCP_SERVICE_ACCOUNT, e.g. cloud-webapp-deployer@) —
#    submits the build and deploys the job:
#      roles/cloudbuild.builds.editor          (submit the in-cloud build)
#      roles/run.admin                         (deploy the Cloud Run Job)
#      roles/iam.serviceAccountUser on indexer-runtime@<project>.iam...
#                                              (deploy a job that runs AS it)
#      roles/iam.serviceAccountUser on the BUILD SA below
#                                              (submit a build that runs AS it)
#
# B) The BUILD SA — the SA the in-cloud build runs as. The script now sets this
#    explicitly via --service-account (default: the Compute Engine default SA,
#    <projectNumber>-compute@developer.gserviceaccount.com; override with
#    BUILD_SA). It needs:
#      roles/storage.objectViewer on gs://<project>-models  (read staged weights)
#      roles/artifactregistry.writer                        (push the image)
#      write access to gs://<project>_cloudbuild  (build logs/source staging)
#
# Models must already be staged in GCS (see docs/DEPLOYMENT.md §6b); the script
# preflights this and fails early if the bucket is empty.

on:
  push:
    branches: [main]
    paths:
      - 'cloud-webapp/indexer/**'
      - 'cloud-webapp/infra/scripts/deploy-indexer.sh'
      - '.github/workflows/deploy-indexer.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation OIDC token

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and deploy the photo-indexer job
        working-directory: cloud-webapp
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          ./infra/scripts/deploy-indexer.sh "$PROJECT_ID" "$REGION"
