name: Deploy api to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'cloud-webapp/api/**'
      - 'cloud-webapp/shared/**'
      - 'cloud-webapp/package.json'
      - 'cloud-webapp/package-lock.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation OIDC token

env:
  SERVICE: event-photo-api
  REPO: cloud-webapp

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push container
        working-directory: cloud-webapp
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:${GITHUB_SHA::7}"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          docker build -f api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          # Repo variable (Settings → Secrets and variables → Actions → Variables).
          # Set after the matcher service is deployed; empty = findme routes 503.
          MATCHER_URL: ${{ vars.MATCHER_URL }}
          # Master Sheet id for "Sync with Drive" (repo variable); empty = sync 503s.
          MASTER_SPREADSHEET_ID: ${{ vars.MASTER_SPREADSHEET_ID }}
          # NOTE: SYNC_TRIGGER_TOKEN is NOT injected here as a literal env var.
          # It lives in Secret Manager and is wired via --set-secrets below, the
          # same way deploy-api.sh does it. Passing it as a string literal while
          # the live service has it secret-backed fails the deploy with
          # "Cannot update environment variable ... to string literal because it
          # has already been set with a different type."
          # Pilot feature flag (repo variable; dev plan M6.1). Comma-separated
          # event IDs Find Me search is gated to. EMPTY (default) = all events
          # allowed. Set it to the pilot event id to launch to one event; clear
          # it for general rollout (M6.4). Durable here so it survives deploys —
          # a transient `gcloud run services update --update-env-vars` would be
          # wiped by the --set-env-vars below on the next deploy.
          FINDME_EVENT_ALLOWLIST: ${{ vars.FINDME_EVENT_ALLOWLIST }}
        run: |
          gcloud run deploy "$SERVICE" \
            --image="$IMAGE" \
            --region="$REGION" \
            --project="$PROJECT_ID" \
            --platform=managed \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --max-instances=10 \
            --min-instances=0 \
            --concurrency=80 \
            --timeout=60 \
            --update-env-vars="NODE_ENV=production,GCP_PROJECT_ID=${PROJECT_ID},FIREBASE_PROJECT_ID=${PROJECT_ID},GIT_COMMIT_SHA=${GITHUB_SHA::7},MATCHER_URL=${MATCHER_URL},MASTER_SPREADSHEET_ID=${MASTER_SPREADSHEET_ID},FINDME_EVENT_ALLOWLIST=${FINDME_EVENT_ALLOWLIST}" \
            --set-secrets="SYNC_TRIGGER_TOKEN=SYNC_TRIGGER_TOKEN:latest,CONSENT_POLICY_VERSION=CONSENT_POLICY_VERSION:latest,RECAPTCHA_KEY=RECAPTCHA_KEY:latest"
          # Auth: deliberately pass NEITHER --allow-unauthenticated nor
          # --no-allow-unauthenticated, so the deploy leaves the service's IAM
          # policy untouched (matches deploy-api.sh + CLAUDE.md). --allow-unauthenticated
          # tries to (re)add the allUsers binding, which the org DRS policy blocks
          # and which can itself fail the deploy; --no-allow-unauthenticated strips
          # the allUsers binding the Firebase Hosting rewrite depends on.

      - name: Smoke test
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          URL=$(gcloud run services describe "$SERVICE" --region="$REGION" --project="$PROJECT_ID" --format='value(status.url)')
          echo "Service URL: $URL"
          curl -fsS "$URL/api/health"
