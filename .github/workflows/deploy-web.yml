name: Deploy web to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'cloud-webapp/web/**'
      - 'cloud-webapp/shared/**'
      - 'cloud-webapp/firebase.json'
      - 'cloud-webapp/infra/firestore.rules'
      - 'cloud-webapp/infra/firestore.indexes.json'
      - 'cloud-webapp/infra/storage.rules'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-webapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: cloud-webapp/.nvmrc
          cache: npm
          cache-dependency-path: cloud-webapp/package-lock.json

      - run: npm ci

      # shared must be built first: web's tsconfig has a project reference to
      # ../shared and fails (TS6305) if shared/dist is missing on a clean clone.
      - run: npm run build -w @cloud-webapp/shared

      # VITE_RECAPTCHA_SITE_KEY is baked into the bundle at build time. It is a
      # PUBLIC value (it ships in client JS), so it lives in a repo variable, not
      # a secret. It MUST match the api service's RECAPTCHA_SITE_KEY or
      # /api/findme/search rejects every search with a 403 ("We could not verify
      # this request"). When the var is unset the client token helper no-ops,
      # which is the correct behaviour for environments with the gate turned off.
      - run: npm run build -w @cloud-webapp/web
        env:
          VITE_RECAPTCHA_SITE_KEY: ${{ vars.VITE_RECAPTCHA_SITE_KEY }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install firebase-tools
        # Pinned, NOT @latest: firebase-tools v15 wraps its ADC path
        # (autoAuth) in a short hardcoded timeout that the Workload Identity
        # Federation token exchange overruns, so `firebase deploy` ignores the
        # valid GOOGLE_APPLICATION_CREDENTIALS file the auth step exports and
        # dies with "Failed to authenticate, have you run firebase login?".
        # See https://github.com/firebase/firebase-tools/issues/10726. v14 is
        # the pre-regression line and authenticates from WIF ADC fine. Bump
        # only once that bug is fixed upstream (then @latest is safe again).
        run: npm install -g firebase-tools@14.27.0

      - name: Deploy
        working-directory: cloud-webapp
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          firebase --version
          firebase deploy \
            --project="$PROJECT_ID" \
            --only=hosting,firestore:rules,firestore:indexes,storage \
            --non-interactive \
            --debug
