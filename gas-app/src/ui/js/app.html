<script>
  /**
   * app.html — Client-side utilities loaded on every page.
   *
   * Responsibilities:
   *   - Toast notifications
   *   - Generic server call wrapper (google.script.run)
   *   - Button loading state helpers
   *   - Navigation rendering
   */

  // ── Toast ──────────────────────────────────────────────────────────────────

  /**
   * Shows a dismissable toast message.
   * @param {string} message  Text to display
   * @param {'success'|'error'|'warning'} type
   * @param {number} [duration=4000]  Auto-dismiss after this many ms (0 = no auto-dismiss)
   */
  function showToast(message, type, duration) {
    duration = duration === undefined ? 4000 : duration;
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'success');
    toast.textContent = message;
    toast.setAttribute('role', 'alert');
    container.appendChild(toast);

    if (duration > 0) {
      setTimeout(function () {
        toast.classList.add('fading');
        setTimeout(function () {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 400);
      }, duration);
    }
  }

  // ── Server call wrapper ────────────────────────────────────────────────────

  /**
   * Wraps google.script.run with Promise semantics and button loading states.
   *
   * @param {string}   functionName  Name of the server-side function to call
   * @param {*}        args          Arguments to pass
   * @param {Element}  [btn]         Submit button to disable during the call
   * @param {Element}  [spinner]     Spinner element to show during the call
   * @returns {Promise<*>}
   */
  // ── Session token ──────────────────────────────────────────────────────────
  //
  // The server is the source of truth. Each authenticated page render injects
  // window.SESSION_TOKEN via the template; that token is always the current,
  // valid one for this user as of this page load.
  //
  // sessionStorage acts only as a fallback for the edge case where a page
  // somehow renders without window.SESSION_TOKEN. We keep it in sync with
  // the server-injected value on every page load — otherwise a stale token
  // from an earlier login survives in sessionStorage and hijacks every
  // subsequent navigate() call, redirecting users to the login page with
  // "Session expired or invalid" even though they just signed in.

  function getSessionToken() {
    // Prefer the server-injected token (authoritative for THIS page render).
    // Fall back to sessionStorage only if the server didn't inject one.
    return (window.SESSION_TOKEN || '') || sessionStorage.getItem('gasSessionToken') || '';
  }

  function setSessionToken(token) {
    sessionStorage.setItem('gasSessionToken', token);
    window.SESSION_TOKEN = token;
  }

  // On every page load, overwrite sessionStorage with the server-injected
  // token so a stale value from a prior login can never leak into navigate().
  // This MUST overwrite unconditionally — NOT "only if sessionStorage is
  // empty" — because the whole bug class is: old token in sessionStorage,
  // new token from server, old one wins because of the `!sessionStorage…`
  // guard that used to be here.
  document.addEventListener('DOMContentLoaded', function () {
    if (window.SESSION_TOKEN) {
      sessionStorage.setItem('gasSessionToken', window.SESSION_TOKEN);
    }
  });

  function callServer(functionName, args, btn, spinner) {
    return new Promise(function (resolve, reject) {
      if (btn) {
        btn.disabled = true;
        btn.setAttribute('aria-busy', 'true');
      }
      if (spinner) spinner.classList.remove('hidden');

      // Auto-inject sessionToken into every payload
      var payload = (args && typeof args === 'object') ? args : { _args: args };
      if (!payload.sessionToken) {
        payload.sessionToken = getSessionToken();
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (btn) {
            btn.disabled = false;
            btn.removeAttribute('aria-busy');
          }
          if (spinner) spinner.classList.add('hidden');
          resolve(result);
        })
        .withFailureHandler(function (err) {
          if (btn) {
            btn.disabled = false;
            btn.removeAttribute('aria-busy');
          }
          if (spinner) spinner.classList.add('hidden');
          reject(err);
        })
        [functionName](payload);
    });
  }

  // ── Form helpers ───────────────────────────────────────────────────────────

  /** Clears all field-level error messages in a form. */
  function clearErrors(form) {
    var errors = form.querySelectorAll('.field-error');
    errors.forEach(function (el) { el.textContent = ''; });
  }

  /**
   * Displays field-level errors returned by the server.
   * @param {Array<{field:string, message:string}>} errors
   * @param {string} formId
   */
  function showFieldErrors(errors, formId) {
    errors.forEach(function (err) {
      var el = document.getElementById('error-' + err.field);
      if (el) el.textContent = err.message;
    });
  }

  // ── Navigation ─────────────────────────────────────────────────────────────
  //
  // GAS serves the app inside an iframe on googleusercontent.com, but the
  // real doGet endpoint lives on script.google.com. Relative href="?action=..."
  // links resolve against the iframe URL and never reach GAS. We intercept
  // every action link and navigate window.top using window.APP_URL, which is
  // the canonical script.google.com deployment URL injected server-side.

  /**
   * Navigates the outer (script.google.com) frame to a route action.
   *
   * window.APP_URL is injected server-side by getCanonicalScriptUrl()
   * via renderTemplate() in pageRoutes.ts, and output into each template as
   *   window.APP_URL = '<deployment url>';
   * just before this file is included. Canonical form is used so the URL is
   * identical for Workspace and external Google accounts (required for the
   * OAuth redirect_uri to match across sign-in + token-exchange phases).
   *
   * We navigate window.top (not window) because the GAS web app renders inside
   * an iframe on googleusercontent.com; only the outer script.google.com frame
   * properly routes query-parameter changes back through doGet.
   */
  function navigate(action) {
    var base = (window.APP_URL || window.location.href).split('?')[0];
    var token = getSessionToken();
    var url = base + '?action=' + action;
    if (token) url += '&session=' + encodeURIComponent(token);
    window.top.location.href = url;
  }

  // ── Logout ────────────────────────────────────────────────────────────────
  //
  // Best-effort logout: invalidates the server session token, clears local
  // session state, and redirects to the login page. We don't block on the
  // server response — even if the network call fails, clearing the local
  // token and navigating to ?action=login is enough to put the user in the
  // logged-out UI. The login route is gated BEFORE auth in the router, so it
  // will render even if a stale GAS native session is still detected.
  //
  // The fire-and-forget pattern is intentional: a failed logout call must
  // never trap the user on a page where their session is half-cleared.
  function logout() {
    var token = getSessionToken();
    // Clear local state synchronously so a subsequent back-navigation can't
    // resurrect the old token from sessionStorage.
    try { sessionStorage.removeItem('gasSessionToken'); } catch (_) {}
    window.SESSION_TOKEN = '';

    // Fire the server-side invalidation — but don't await it.
    if (token && typeof google !== 'undefined' && google.script && google.script.run) {
      try {
        google.script.run
          .withSuccessHandler(function () {})
          .withFailureHandler(function () {})
          .serverLogout({ sessionToken: token });
      } catch (_) {
        // Swallow — we're navigating away anyway.
      }
    }

    // Navigate to login. Use APP_URL because relative routes don't resolve
    // back to script.google.com from the googleusercontent.com iframe.
    var base = (window.APP_URL || window.location.href).split('?')[0];
    window.top.location.href = base + '?action=login';
  }
  // Expose for any inline onclick handlers and for ad-hoc console testing.
  window.logout = logout;

  // Intercept all href="?action=..." links so they go through navigate()
  // instead of trying to load a googleusercontent.com URL directly.
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('a[href]').forEach(function (link) {
      var href = link.getAttribute('href') || '';
      if (!href.includes('action=')) return;
      link.addEventListener('click', function (e) {
        e.preventDefault();
        var qs = href.startsWith('?') ? href.slice(1) : (href.split('?')[1] || '');
        var action = new URLSearchParams(qs).get('action');
        if (action) navigate(action);
      });
    });
  });

  // ── Nav hamburger toggle ──────────────────────────────────────────────────
  //
  // Responsive strategy: instead of a fixed media-query breakpoint, a
  // ResizeObserver measures the header row and flips it into "collapsed"
  // mode (hamburger) the moment the inline nav links would overflow the
  // available space. That removes the dead zone between a static breakpoint
  // and the actual overflow width, and adapts to per-role nav link counts.
  //
  //   - .nav-collapsed  → added by JS when inline nav would overflow;
  //                       CSS hides nav-panel, shows hamburger toggle.
  //   - .nav-open       → added on hamburger click; CSS reveals nav-panel
  //                       as a dropdown below the header.
  //   - .user-menu      → always visible in the header. Clicking the avatar
  //                       opens a popover with the full email.
  document.addEventListener('DOMContentLoaded', function () {
    var row = document.querySelector('.mdl-layout__header-row');
    if (!row) return;

    // ── Responsive collapse (measure-based) ────────────────────────────────
    //
    // Decide collapsed state by removing the class, measuring the natural
    // width of the row, and re-adding the class if the children overflow.
    // Everything happens inside a single requestAnimationFrame so the
    // intermediate "uncollapsed" layout is never painted.
    var collapseRaf = 0;
    function updateNavCollapse() {
      if (collapseRaf) return;
      collapseRaf = requestAnimationFrame(function () {
        collapseRaf = 0;
        // Test the uncollapsed layout. We toggle synchronously within one
        // frame; the browser won't paint until this RAF completes.
        var wasCollapsed = row.classList.contains('nav-collapsed');
        row.classList.remove('nav-collapsed');
        // +2px fudge for sub-pixel rounding
        var overflows = row.scrollWidth > row.clientWidth + 2;
        if (overflows) {
          row.classList.add('nav-collapsed');
          // If the layout grew and we were showing the mobile dropdown,
          // closing state is unnecessary — but if we just switched INTO
          // collapsed mode we don't want a stale .nav-open either.
        } else if (wasCollapsed) {
          // Switched to inline mode — clean up any dropdown state.
          row.classList.remove('nav-open');
          var t = row.querySelector('.nav-toggle');
          if (t) t.setAttribute('aria-expanded', 'false');
        }
      });
    }

    // Initial measurement + observe subsequent size changes and nav mutations
    // (the nav-links list is populated by each page template after load).
    updateNavCollapse();
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(updateNavCollapse).observe(row);
    } else {
      // Fallback for older browsers
      window.addEventListener('resize', updateNavCollapse);
    }
    var navLinks = row.querySelector('#nav-links');
    if (navLinks && typeof MutationObserver !== 'undefined') {
      new MutationObserver(updateNavCollapse).observe(navLinks, { childList: true, subtree: true });
    }

    // ── Hamburger toggle ───────────────────────────────────────────────────
    var toggles = row.querySelectorAll('.nav-toggle');
    toggles.forEach(function (toggle) {
      toggle.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = row.classList.toggle('nav-open');
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    });

    // Tap outside the nav dropdown closes it.
    document.addEventListener('click', function (e) {
      document.querySelectorAll('.mdl-layout__header-row.nav-open').forEach(function (r) {
        if (r.contains(e.target)) return;
        r.classList.remove('nav-open');
        var tgl = r.querySelector('.nav-toggle');
        if (tgl) tgl.setAttribute('aria-expanded', 'false');
      });
    });

    // ── User menu popover ──────────────────────────────────────────────────
    var userTrigger = row.querySelector('.user-menu-trigger');
    var userPopover = row.querySelector('.user-menu-popover');
    if (userTrigger && userPopover) {
      userTrigger.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = userPopover.hasAttribute('hidden');
        if (open) {
          userPopover.removeAttribute('hidden');
          userTrigger.setAttribute('aria-expanded', 'true');
        } else {
          userPopover.setAttribute('hidden', '');
          userTrigger.setAttribute('aria-expanded', 'false');
        }
      });
      // Close on outside click
      document.addEventListener('click', function (e) {
        if (userPopover.hasAttribute('hidden')) return;
        if (userPopover.contains(e.target) || userTrigger.contains(e.target)) return;
        userPopover.setAttribute('hidden', '');
        userTrigger.setAttribute('aria-expanded', 'false');
      });
      // Close on Escape
      document.addEventListener('keydown', function (e) {
        if (e.key !== 'Escape') return;
        if (userPopover.hasAttribute('hidden')) return;
        userPopover.setAttribute('hidden', '');
        userTrigger.setAttribute('aria-expanded', 'false');
        userTrigger.focus();
      });

      // Logout button inside the popover. Stop propagation so the popover
      // doesn't immediately re-close before the click registers, and disable
      // the button to prevent double-clicks during the redirect.
      var logoutBtn = userPopover.querySelector('.user-menu-popover-logout');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          logoutBtn.disabled = true;
          logoutBtn.setAttribute('aria-busy', 'true');
          logout();
        });
      }
    }
  });

  // ── Confirmation helper ────────────────────────────────────────────────────

  /**
   * Replaces a button with an inline confirmation prompt.
   * Returns a Promise that resolves true (confirmed) or false (cancelled).
   *
   * @param {Element} triggerBtn   The button that was clicked
   * @param {string}  promptText   e.g. "Deactivate Jane Doe?"
   */
  function confirmInline(triggerBtn, promptText) {
    return new Promise(function (resolve) {
      var parent = triggerBtn.parentNode;
      var saved = triggerBtn.outerHTML;

      var prompt = document.createElement('span');
      prompt.className = 'confirm-prompt';
      prompt.innerHTML =
        promptText + ' ' +
        '<button class="mdl-button mdl-js-button mdl-button--raised mdl-button--accent" ' +
        'style="min-width:0;padding:0 8px;height:28px;font-size:12px">Yes</button> ' +
        '<button class="mdl-button mdl-js-button" style="min-width:0;padding:0 8px;height:28px;font-size:12px">Cancel</button>';

      parent.replaceChild(prompt, triggerBtn);

      // Restore helper — called by Yes, Cancel, or click-outside
      function dismiss(confirmed) {
        document.removeEventListener('mousedown', onOutsideClick, true);
        parent.innerHTML = saved;
        if (window.componentHandler) componentHandler.upgradeDom();
        resolve(confirmed);
      }

      // Click-outside: resolve false and restore the original button
      function onOutsideClick(e) {
        if (!prompt.contains(e.target)) dismiss(false);
      }
      // Delay one tick so the triggering click itself doesn't fire it
      setTimeout(function () {
        document.addEventListener('mousedown', onOutsideClick, true);
      }, 0);

      prompt.querySelector('button:first-of-type').addEventListener('click', function () {
        dismiss(true);
      });

      prompt.querySelector('button:last-of-type').addEventListener('click', function () {
        dismiss(false);
      });
    });
  }
</script>
