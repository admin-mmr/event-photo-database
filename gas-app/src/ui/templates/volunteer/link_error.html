<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Not Available</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      max-width: 440px;
      width: 100%;
      padding: 40px 36px;
      text-align: center;
    }

    .icon { font-size: 48px; margin-bottom: 16px; }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #c62828;
      margin-bottom: 10px;
    }

    .message {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .hint {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 13px;
      color: #6d4c00;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><?= isRevoked ? '🔒' : '🔗' ?></div>
    <h1><?= isRevoked ? 'Link Revoked' : 'Link Not Available' ?></h1>
    <p class="message"><?= message ?></p>
    <div class="hint"><?= contactHint ?></div>
  </div>
</body>
</html>
