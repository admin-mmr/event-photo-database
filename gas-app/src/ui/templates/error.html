<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet"

  <style>
    .error-page {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; flex-direction: column; text-align: center; color: #555;
    }
    .error-page .material-icons { font-size: 64px; color: #f57c00; margin-bottom: 16px; }
    .error-page h4 { margin: 0 0 8px; color: #333; }
    @media (max-width: 600px) {
      .error-page {
        min-height: unset;
        padding: 48px 20px 32px;
        justify-content: flex-start;
      }
      .error-page .material-icons { font-size: 96px; margin-bottom: 20px; }

<body>
  <div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">
    <header class="mdl-layout__header">
      <div class="mdl-layout__header-row">
        <span class="mdl-layout-title">湘舍动公益文件系统</span>
      </div>
    </header>
    <main class="mdl-layout__content">
      <div class="page-content">
        <div class="error-page">
          <i class="material-icons">error_outline</i>
          <h4>Something Went Wrong</h4>
          <p style="white-space: pre-wrap; font-family: monospace; font-size: 13px; background: #f5f5f5; padding: 12px; border-radius: 4px; text-align: left; max-width: 600px;"><?= message ?></p>
          <button onclick="navigate('dashboard')"
             class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">
            Return to Dashboard
          </button>
        </div>
      </div>
    </main>
  </div>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
  <script>
    // APP_URL is injected by renderTemplate via scriptUrl so window.top navigation
    // resolves to script.google.com instead of the inner googleusercontent.com iframe.
    window.APP_URL = '<?= scriptUrl ?>';
    function navigate(action) {
      var base = (window.APP_URL || window.location.href).split('?')[0];
      window.top.location.href = base + '?action=' + action;
    }
  </script>
</body>
