    .audit-action {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;

    .audit-action.event   { background: #e8f5e9; color: #2e7d32; }

      max-width: 260px;

      white-space: nowrap;

    .details-cell.expanded {

      word-break: break-all;
    }

      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 16px;
    }
    .filter-row .mdl-textfield { margin: 0; }
    #audit-empty {
      text-align: center;
      color: #999;
      padding: 32px;
    }

  </script>
  <?!= HtmlService.createHtmlOutputFromFile('ui/js/app').getContent() ?>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    var PAGE_SIZE    = 50;
    var currentPage  = 1;
    var currentTotal = <?= initialTotal ?>;
    var filterTimer  = null;

    // Initial data from server-side render (no extra round-trip on load)
    var cachedItems  = <?!= initialLogs ?>;

    // ── Render ───────────────────────────────────────────────────────────────
    function actionClass(action) {
      if (action.startsWith('USER_'))   return 'user';
      if (action.startsWith('EVENT_'))  return 'event';
      if (action.startsWith('CLUB_'))   return 'club';
      return 'report';
    }

    function fmtTimestamp(ts) {
      if (!ts) return '';
      // "2026-04-18T09:15:02.123Z" → "2026-04-18 09:15:02"
      return ts.replace('T', ' ').slice(0, 19);
    }

    function renderRows(items) {
      var tbody = document.getElementById('audit-tbody');
      var empty = document.getElementById('audit-empty');

      if (!items || items.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      tbody.innerHTML = items.map(function(row, idx) {
        var cls = actionClass(row.action);
        var detailsId = 'det-' + idx;
        return '<tr>' +
          '<td class="mdl-data-table__cell--non-numeric" style="font-size:12px;color:#777;white-space:nowrap;">' +
            escapeHtml(fmtTimestamp(row.timestamp)) +
          '</td>' +
          '<td class="mdl-data-table__cell--non-numeric">' +
            escapeHtml(row.actorEmail) +
          '</td>' +
          '<td class="mdl-data-table__cell--non-numeric">' +
            '<span class="audit-action ' + cls + '">' + escapeHtml(row.action) + '</span>' +
          '</td>' +
          '<td class="mdl-data-table__cell--non-numeric">' +
            (row.resourceId
              ? '<span style="font-size:12px;">' + escapeHtml(row.resourceType) + '</span>' +
                '<br><span style="font-size:11px;color:#555;">' + escapeHtml(row.resourceId) + '</span>'
              : '<span style="font-size:12px;">' + escapeHtml(row.resourceType) + '</span>') +
          '</td>' +
          '<td class="mdl-data-table__cell--non-numeric">' +
            '<div class="details-cell" id="' + detailsId + '"' +
              ' title="Click to expand" onclick="toggleDetails(\'' + detailsId + '\')">' +
              escapeHtml(row.details) +
            '</div>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    function toggleDetails(id) {
      var el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle('expanded');
    }

    function updatePagination(total) {
      var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      var pagRow = document.getElementById('pagination-row');
      pagRow.style.display = total > PAGE_SIZE ? '' : 'none';
      document.getElementById('page-label').textContent =
        'Page ' + currentPage + ' of ' + totalPages;
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
      document.getElementById('total-badge').textContent = '(' + total + ' total)';
    }

    // ── Filter + pagination ───────────────────────────────────────────────────
    function scheduleFilter() {
      clearTimeout(filterTimer);
      filterTimer = setTimeout(function() { applyFilter(1); }, 400);
    }

    function clearFilters() {
      document.getElementById('filter-actor').value = '';
      document.getElementById('filter-from').value  = '';
      document.getElementById('filter-to').value    = '';
      applyFilter(1);
    }

    function goPage(page) {
      applyFilter(page);
    }

    function applyFilter(page) {
      var actor   = document.getElementById('filter-actor').value.trim();
      var from    = document.getElementById('filter-from').value;
      var to      = document.getElementById('filter-to').value;
      var spinner = document.getElementById('filter-spinner');

      currentPage = page;
      spinner.classList.remove('hidden');

      var payload = { page: page, pageSize: PAGE_SIZE };
      if (actor) payload.actorEmail = actor;
      if (from)  payload.dateFrom   = from;
      if (to)    payload.dateTo     = to;

      callServer('serverGetAuditLog', payload)
        .then(function(result) {
          spinner.classList.add('hidden');
          if (result.status === 'error') {
            showToast(result.message, 'error');
            return;
          }
          cachedItems    = result.data.items;
          currentTotal   = result.data.total;
          renderRows(cachedItems);
          updatePagination(currentTotal);
        })
        .catch(function(err) {
          spinner.classList.add('hidden');
          showToast('Error loading audit log: ' + String(err), 'error');
        });
    }

    // ── Initial render (uses server-side pre-loaded data) ─────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      renderRows(cachedItems);
      updatePagination(currentTotal);
    });
  </script>
</body>
</html>
